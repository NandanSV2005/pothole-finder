services:
  - type: web
    name: pothole-finder
    env: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./pothole_detector.db
      - key: UPLOAD_DIR
        value: backend/data/uploads
      - key: MODEL_PATH
        value: weights/yolov8n.pt
      - key: JWT_SECRET
        generateValue: true
